# 桃子预售后台本地启动配置模板
#
# 使用方法：
# 1. 复制本文件：cp admin-web/local-runtime.sample.conf admin-web/local-runtime.conf
# 2. 打开 admin-web/local-runtime.conf，填入真实参数
# 3. 启动后台：./scripts/start-admin-local.sh
#
# 注意：
# - 不要把 admin-web/local-runtime.conf 发给别人
# - 不要把 admin-web/local-runtime.conf 上传到代码仓库
# - 下面的值不要加引号，直接写在等号后面即可

# 服务器持久化目录；正式部署时建议改成服务器上的绝对路径
PEACH_DB_PATH=admin-web/data/peach-admin.sqlite
PEACH_UPLOAD_DIR=admin-web/uploads

# 微信小程序登录；微信支付 JSAPI 也会使用同一个 AppID
WECHAT_APPID=
WECHAT_APP_SECRET=

# 微信支付证书文件建议统一放这里：admin-web/certs/wechat-pay/
# 需要你手动放入这 4 个文件：
# - apiclient_key.pem   ：商户私钥，代码会读取，填到 WECHAT_PAY_PRIVATE_KEY_PATH
# - apiclient_cert.pem  ：商户证书，用来查询商户证书序列号，不需要填路径
# - apiclient_cert.p12  ：证书包，当前项目暂时不用，留作备份
# - pub_key.pem         ：微信支付公钥，代码会读取，填到 WECHAT_PAY_PLATFORM_CERT_PATH

# 微信支付 API v3（小程序 JSAPI 支付）
# 未配置或 WECHAT_PAY_ENABLED=0 时，系统继续走本地模拟支付成功逻辑
WECHAT_PAY_ENABLED=0
WECHAT_PAY_MCH_ID=
WECHAT_PAY_MCH_SERIAL_NO=
# 商户 API 证书私钥 apiclient_key.pem 的路径；只填路径，不要把私钥内容写进来
WECHAT_PAY_PRIVATE_KEY_PATH=admin-web/certs/wechat-pay/apiclient_key.pem
# APIv3 密钥，商户平台「账户中心 → API安全」里设置的 32 位密钥
WECHAT_PAY_API_V3_KEY=
# 支付结果通知地址，正式环境必须是公网 HTTPS
WECHAT_PAY_NOTIFY_URL=https://taozi.shayudata.com/api/storefront/wechat-pay/notify
# 退款结果通知地址，正式环境必须是公网 HTTPS；用于微信原路退款成功后自动更新本地订单状态
WECHAT_PAY_REFUND_NOTIFY_URL=https://taozi.shayudata.com/api/storefront/wechat-pay/refund-notify
# 微信支付公钥 pub_key.pem 的路径；用于校验支付通知签名，正式上线建议配置并开启验签
WECHAT_PAY_PLATFORM_CERT_PATH=admin-web/certs/wechat-pay/pub_key.pem
WECHAT_PAY_PLATFORM_SERIAL_NO=
WECHAT_PAY_VERIFY_NOTIFY_SIGNATURE=0
# 本地联调可临时设为 1：wx.requestPayment 成功后由客户端确认订单已支付；正式上线建议保持 0，完全以微信支付通知为准
WECHAT_PAY_CLIENT_CONFIRM=0

# 微信小程序订单管理发货信息同步
# 留空时跟随 WECHAT_PAY_ENABLED；正式支付上线前请先完成微信公众平台「订单管理/发货信息录入」接入
WECHAT_SHIPPING_ENABLED=
# 不填时默认使用 WECHAT_PAY_MCH_ID
WECHAT_SHIPPING_MCH_ID=
# 可选：快递公司名称到微信运力 ID 的映射；不填时使用内置常见快递映射
# WECHAT_SHIPPING_EXPRESS_COMPANY_MAP={"顺丰速运":"SF","中通快递":"ZTO"}

# 腾讯地图：用于地址解析、自提点距离排序
TENCENT_MAP_KEY=
TENCENT_MAP_SK=

# 芯烨云打印机：用于订单标签自动打印
XPYUN_USER=
XPYUN_USER_KEY=
XPYUN_PRINTER_SN=
XPYUN_PRINTER_PUBLIC_CODE=
XPYUN_LABEL_WIDTH=80
XPYUN_LABEL_HEIGHT=60
XPYUN_AUTO_PRINT=1
# 如需打印条形码，改成 1；默认 0 更省空间
XPYUN_LABEL_BARCODE=0

# 后台登录账号密码；本地开发可留空密码，正式部署建议必须填写
PEACH_ADMIN_USERNAME=
PEACH_ADMIN_PASSWORD=
